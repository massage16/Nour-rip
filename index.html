<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حجز خدمات مساج</title>

<style>
body{

display:flex;
justify-content:center;
padding:20px;
color:white;
}

.container{
width:100%;

background:rgba(0,0,0,0.75);

}

h2{

color:#00ffcc;
}

input,select,button{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
outline:none;
}

button{
background:#00ffcc;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

/* مهم جداً */
.step{
display:none;
}

.step.active{
display:block;
}

}
</style>
</head>

<select id="service">

<button onclick="nextStep()">التالي</button>

</div>

<!-- STEP 2 -->
<div id="step2" class="step">

</p>

<input type="file" id="proof">

<button onclick="send()">تأكيد الحجز</button>

<button onclick="backStep()" style="background:#444;color:white;">
رجوع
</button>

<p id="msg"></p>

</div>

</div>

===================== */
function nextStep(){

document.getElementById("step1").classList.remove("active");
document.getElementById("step2").classList.add("active");

}

function backStep(){

document.getElementById("step2").classList.remove("active");
document.getElementById("step1").classList.add("active");

}
